    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=pizza_net"
      - "traefik.http.routers.order.rule=Host(`order.pizza.ew-production.ru`)"
      - "traefik.http.routers.order.entrypoints=websecure"
      - "traefik.http.routers.order.tls=true"
      - "traefik.http.routers.order.tls.certresolver=letsencrypt"
      - "traefik.http.services.order.loadbalancer.server.port=80"
      - "traefik.http.middlewares.order-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE"
      - "traefik.http.middlewares.order-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.order-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.routers.order.middlewares=order-cors"

  # ==================== MFE: SHELL (PROD MODE) ====================
  shell:
    build:
      context: ./micro-frontends
      dockerfile: shell/Dockerfile.prod
      args:
        VITE_API_URL: https://api.pizza.ew-production.ru
        VITE_AUTH_URL: https://auth.pizza.ew-production.ru
        VITE_CART_URL: https://cart.pizza.ew-production.ru
        VITE_PROFILE_URL: https://profile.pizza.ew-production.ru
        VITE_ORDER_URL: https://order.pizza.ew-production.ru
        VITE_PIZZA_BUILDER_URL: https://builder.pizza.ew-production.ru
        VITE_BASE_URL: https://micro.pizza.ew-production.ru/
    container_name: mfe-shell
    restart: always
