      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # CORS middleware (parity with MFE shell — equal Traefik overhead)
      - "traefik.http.middlewares.frontend-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE"
      - "traefik.http.middlewares.frontend-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.frontend-cors.headers.accesscontrolallowheaders=*"
