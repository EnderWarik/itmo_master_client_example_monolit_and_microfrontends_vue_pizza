# Nginx config for Pizza project (HTTP only)
# Install on server: sudo apt install nginx
# Copy this file to: /etc/nginx/sites-available/pizza
# Enable: sudo ln -s /etc/nginx/sites-available/pizza /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

# API Backend
server {
    listen 80;
    server_name api.pizza.ew-production.ru;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

