version: "3.8"

# Local Production Testing
# Run: docker compose -f docker-compose.prod.local.yml up --build

services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:15-alpine
    container_name: pizza-db-local
    restart: always
    environment:
      POSTGRES_USER: pizza
      POSTGRES_PASSWORD: pizza_password
      POSTGRES_DB: pizza
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizza"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pizza-backend-local
    restart: always
    environment:
      HOST: "0.0.0.0"
      DB_HOST: pizza-db-local
      DB_PORT: 5432
      DB_USER: pizza
      DB_PASSWORD: pizza_password
      DB_NAME: pizza
      # For local testing, we might not need DATABASE_URL if individual vars work, 
      # but keeping it safe. Internal docker usage.
      DATABASE_URL: postgres://pizza:pizza_password@pizza-db-local:5432/pizza
      JWT_SECRET: local-secret
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ==================== MFE: PIZZA BUILDER (PROD MODE) ====================
  pizza-builder:
    build:
      context: ./micro-frontends
      dockerfile: pizza-builder/Dockerfile.prod
      args:
        # Browser will access backend at localhost:3000
        VITE_API_URL: http://localhost:3000
    container_name: mfe-pizza-builder-local
    restart: always
    ports:
      - "8080:80"
